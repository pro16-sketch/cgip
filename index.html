<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="9423110.png">
		<link rel="icon" type="image/png" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231976d2'/%3E%3Ccircle cx='10' cy='10' r='6' fill='%23ffffff'/%3E%3Cpath d='M9 7 L13 7 L13 13 L9 13 Z' fill='%231976d2'/%3E%3C/text x='18' y='18' font-size='8' fill='%23fff'/%3E%3C/svg%3E" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Image Processing Demo</title>
		<style>
			:root{
				--bg: #0b1220;
				--card: #0f1724;
				--muted: #9ca3af;
				--accent: #06b6d4;
				--accent-700: #0891b2;
				--radius: 10px;
				--input-bg: rgba(255,255,255,0.03);
				--border: #1f2937;
			}

			*{box-sizing:border-box}
			body{font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--bg); margin:24px; color:#e6eef8}

			.container{max-width:1100px; margin:0 auto; display:grid; grid-template-columns: 360px 1fr; gap:20px; align-items:start}

			.panel{background:var(--card); border-radius:var(--radius); padding:18px; box-shadow:0 8px 30px rgba(2,6,23,0.6)}

			.header{display:flex; align-items:center; gap:12px; margin-bottom:8px}
			.logo{width:44px; height:44px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-700)); display:flex; align-items:center; justify-content:center; color:white; font-weight:700}
			h1{font-size:20px; margin:0}
			.lead{color:var(--muted); font-size:13px}

			.controls-row{display:flex; gap:8px; align-items:center}

			input[type=file]{padding:6px; background:var(--input-bg); color:var(--muted); border-radius:8px; border:1px solid var(--border)}

			select,input[type=number], input[type=color]{padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--muted)}

			.btn{background:var(--accent); color:black; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:600}
			.btn.secondary{background:#111827; color:#cbd5e1}

			.settings{display:flex; flex-direction:column; gap:12px}

			.preview-wrap{display:flex; flex-direction:column; gap:12px}
			.preview{background:linear-gradient(180deg,#0b1220,#0f1724); border-radius:8px; padding:14px; display:flex; gap:12px; align-items:flex-start}
			.preview img{max-width:100%; border-radius:6px; box-shadow:0 8px 30px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.02)}

			.info{font-size:13px; color:var(--muted)}

			.size-block{font-size:13px; color:var(--muted)}

			.param-row{display:flex; gap:8px; align-items:center}

			@media (max-width:900px){.container{grid-template-columns:1fr; padding:8px}}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="panel">
				<div class="header">
					<img id="siteLogo" src="/logo.svg" alt="logo" style="width:64px; height:64px; border-radius:10px; box-shadow:0 6px 18px rgba(2,6,23,0.08); object-fit:contain" />
					<div>
						<h1>Welcome to Image Processing</h1>
						<div class="lead">Apply filters , compress images and much more.....Enjoy!!!!</div>
					</div>
					<!-- header controls removed (logo change UI moved/disabled) -->
				</div>

				<div class="settings">
					<div class="param-row">
						<input id="fileInput" type="file" accept="image/*" />
						<button id="clearFile" class="btn secondary" type="button" style="margin-left:8px">Clear</button>
					</div>
					<div class="param-row">
						<select id="opSelect">
							<option value="">(none)</option>
							<option value="grayscale">Grayscale</option>
							<option value="blur">Blur</option>
							<option value="sharpen">Sharpen</option>
							<option value="edge">Edge Detect</option>
							<option value="color_filter">Color Filter</option>
							<option value="restore">Restore</option>
							<option value="enhance">Enhance</option>
							<option value="compress">Compress</option>
							<option value="illustrate">Illustrate</option>
							<option value="haze">Haze</option>
							<option value="crop">Crop</option>
							<option value="rotate">Rotate</option>
							<option value="resize">Resize</option>
							<option value="brightness_contrast">Brightness/Contrast</option>
						</select>
						<select id="filterType" style="margin-left:8px; display:none;">
							<option value="sepia">sepia</option>
							<option value="negative">negative</option>
							<option value="emboss">emboss</option>
							<option value="sketch">sketch</option>
							<option value="warm">warm</option>
							<option value="cool">cool</option>
							<option value="vintage">vintage</option>
						</select>
					</div>

					<div id="params" class="controls"></div>

					<div class="param-row">
						<button id="applyBtn" class="btn">Apply</button>
						<a id="downloadBtn" class="btn secondary" href="#" download="result.jpg">Download</a>
						<div id="sizeInfo" class="size-block">
							<div>Original: <strong id="originalSize">-</strong></div>
							<div>Result: <strong id="resultSize">-</strong></div>
						</div>
					</div>

					<div class="param-row">
						<label class="info">Format:</label>
						<select id="fmt"><option value="jpg">JPG</option><option value="png">PNG</option><option value="webp">WebP</option><option value="tiff">TIFF</option></select>
						<label class="info">Quality</label>
						<input id="quality" type="number" value="90" min="1" max="100" />
					</div>
				</div>
			</div>

			<div class="preview-wrap">
				<div class="panel preview">
					<div style="flex:1; display:flex; gap:12px; align-items:flex-start">
						<div style="flex:1">
							<h3>Original</h3>
							<img id="originalImg" src="" alt="original" />
						</div>
						<div style="flex:1">
							<h3>Result</h3>
							<img id="resultImg" src="" alt="result" />
						</div>
					</div>
					<div style="width:220px; padding-left:12px">
						<div class="info">Tips</div>
						<p class="info">Choose an operation, tweak parameters and click Apply. Use Download to save the processed image.</p>
					</div>
				</div>
				<footer style="margin-top:12px; font-size:12px; color:#666">Built with Flask + OpenCV. Runs locally.</footer>
			</div>
		</div>
		<script>
			const fileInput = document.getElementById('fileInput');
			const originalImg = document.getElementById('originalImg');
			const resultImg = document.getElementById('resultImg');
			const opSelect = document.getElementById('opSelect');
			const paramsDiv = document.getElementById('params');
			const applyBtn = document.getElementById('applyBtn');
			const downloadBtn = document.getElementById('downloadBtn');
			const fmt = document.getElementById('fmt');
			const quality = document.getElementById('quality');


			let lastBlobUrl = null; // result blob
			let lastOriginalBlobUrl = null;
			const originalSizeEl = document.getElementById('originalSize');
			const resultSizeEl = document.getElementById('resultSize');
			let lastDownloadFormat = null; // store user's chosen format for download

			function formatBytes(bytes) {
				if (bytes === 0) return '0 B';
				const k = 1024;
				const sizes = ['B','KB','MB','GB','TB'];
				const i = Math.floor(Math.log(bytes) / Math.log(k));
				return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
			}

			fileInput.addEventListener('change', () => {
				const f = fileInput.files[0];
				if (!f) return;
				// show the original image on the left
				if (lastOriginalBlobUrl) { URL.revokeObjectURL(lastOriginalBlobUrl); lastOriginalBlobUrl = null; }
				lastOriginalBlobUrl = URL.createObjectURL(f);
				originalImg.src = lastOriginalBlobUrl;
				originalSizeEl.textContent = formatBytes(f.size);
				// clear previous result
				if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; resultImg.src = ''; resultSizeEl.textContent = '-'; }
			});

			const clearFileBtn = document.getElementById('clearFile');
			if (clearFileBtn) {
				clearFileBtn.addEventListener('click', () => {
					// revoke any blob URLs and reset state
					if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
					if (lastOriginalBlobUrl) { URL.revokeObjectURL(lastOriginalBlobUrl); lastOriginalBlobUrl = null; }
					originalImg.src = '';
					resultImg.src = '';
					fileInput.value = '';
					originalSizeEl.textContent = '-';
					resultSizeEl.textContent = '-';
					downloadBtn.href = '#';
					downloadBtn.removeAttribute('download');
				});
			}



			function updateParams() {
				const op = opSelect.value;
				paramsDiv.innerHTML = '';
				if (op === 'blur') {
					paramsDiv.innerHTML = 'Kernel size: <input id="ksize" type="number" value="5" min="1" />';
				} else if (op === 'rotate') {
					paramsDiv.innerHTML = 'Angle degrees: <input id="angle" type="number" value="0" />';
				} else if (op === 'resize') {
					paramsDiv.innerHTML = 'Width: <input id="w" type="number" value="400" /> Height: <input id="h" type="number" value="300" />';
				} else if (op === 'crop') {
					paramsDiv.innerHTML = 'x: <input id="x" type="number" value="0" /> y: <input id="y" type="number" value="0" /> w: <input id="w" type="number" value="100" /> h: <input id="h" type="number" value="100" />';
				} else if (op === 'brightness_contrast') {
					paramsDiv.innerHTML = 'Alpha (contrast): <input id="alpha" type="number" step="0.1" value="1.0" /> Beta (brightness): <input id="beta" type="number" step="1" value="0" />';
				}
				else if (op === 'compress') {
					paramsDiv.innerHTML = 'Target size: <input id="target" type="number" value="200" min="1" /> <select id="unit"><option value="kb">KB</option><option value="mb">MB</option></select>';
				}
				else if (op === 'illustrate') {
					paramsDiv.innerHTML = 'Downscale: <input id="downscale" type="number" value="1" min="1" /> num_bilateral: <input id="num_bilateral" type="number" value="7" min="1" /> edge_ksize: <input id="edge_ksize" type="number" value="5" min="1" />';
				}
				else if (op === 'haze') {
					paramsDiv.innerHTML = 'Intensity: <input id="intensity" type="number" value="50" min="0" max="100" /> <label style="margin-left:8px">Color: <input id="haze_color" type="color" value="#ffffff" /></label> <label style="margin-left:8px"><input id="haze_vertical" type="checkbox" checked /> Vertical</label>';
				}
				else if (op === 'enhance') {
					paramsDiv.innerHTML = '<label><input id="fix_negative" type="checkbox" /> Fix negative</label> <label style="margin-left:8px">Denoise H: <input id="denoise_h" type="number" value="0" min="0" style="width:80px" /></label> <label style="margin-left:8px">CLAHE: <input id="clahe_clip" type="number" value="2.0" step="0.1" style="width:80px" /></label> <label style="margin-left:8px">Sharpen: <input id="sharpen_amount" type="number" value="0.8" step="0.1" style="width:80px" /></label> <label style="margin-left:8px">Gamma: <input id="gamma" type="number" value="1.0" step="0.1" style="width:80px" /></label> <label style="margin-left:8px"><input id="awb" type="checkbox" /> Auto White Balance</label>';
				}
				// show/hide filterType selector when color_filter or restore operation is selected
				const filterTypeEl = document.getElementById('filterType');
				if (filterTypeEl) {
					filterTypeEl.style.display = (op === 'color_filter' || op === 'restore') ? 'inline-block' : 'none';
				}
			}

			opSelect.addEventListener('change', updateParams);

			async function applyOp() {
				const f = fileInput.files[0];
				if (!f) { alert('Select a file first'); return; }
				const form = new FormData();
				form.append('image', f);
				form.append('op', opSelect.value);
				// collect known params
				['ksize','angle','w','h','x','y','alpha','beta'].forEach(id => {
					const el = document.getElementById(id);
					if (el) form.append(id, el.value);
				});
				// compress parameters
				if (opSelect.value === 'compress') {
					const t = document.getElementById('target');
					const u = document.getElementById('unit');
					if (t) form.append('target', t.value);
					if (u) form.append('unit', u.value);
				}
				if (opSelect.value === 'illustrate') {
					['downscale','num_bilateral','edge_ksize'].forEach(id => {
						const el = document.getElementById(id);
						if (el) form.append(id, el.value);
					});
				}
				if (opSelect.value === 'haze') {
					const intEl = document.getElementById('intensity');
					const colorEl = document.getElementById('haze_color');
					const vertEl = document.getElementById('haze_vertical');
					if (intEl) form.append('intensity', intEl.value);
					if (colorEl) form.append('color', colorEl.value);
					if (vertEl) form.append('vertical', vertEl.checked ? '1' : '0');
				}
				if (opSelect.value === 'haze') {
					const intEl = document.getElementById('intensity');
					const colorEl = document.getElementById('haze_color');
					const vertEl = document.getElementById('haze_vertical');
					if (intEl) form.append('intensity', intEl.value);
					if (colorEl) form.append('color', colorEl.value);
					if (vertEl) form.append('vertical', vertEl.checked ? '1' : '0');
				}
				// include filter type value if present (dropdown next to main select)
				const filterEl = document.getElementById('filterType') || document.getElementById('paramFilterType');
				if (filterEl) form.append('type', filterEl.value);
				// If user selected TIFF as final format, browsers can't preview TIFF in <img>.
				// Use PNG for preview but remember the desired download format.
				lastDownloadFormat = fmt.value;
				const previewFmt = (fmt.value === 'tiff' || fmt.value === 'tif') ? 'png' : fmt.value;
				form.append('fmt', previewFmt);
				form.append('quality', quality.value);

				applyBtn.disabled = true;
				applyBtn.textContent = 'Processing...';
				try {
					const res = await fetch('/api/process', { method:'POST', body: form });
					if (!res.ok) {
						const err = await res.json();
						alert('Error: ' + (err.error||res.statusText));
						return;
					}
					const blob = await res.blob();
					if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
					lastBlobUrl = URL.createObjectURL(blob);
					resultImg.src = lastBlobUrl;
					resultSizeEl.textContent = formatBytes(blob.size);
					// Download behavior: if download format equals preview format, set href.
					if (lastDownloadFormat === previewFmt) {
						downloadBtn.href = lastBlobUrl;
						downloadBtn.download = 'result.' + previewFmt;
					} else {
						// For TIFF download, we'll fetch on click. Use a placeholder href to keep style.
						downloadBtn.href = '#';
						downloadBtn.download = 'result.' + lastDownloadFormat;
						// set the result image element to empty when preview differs
						resultImg.src = '';
					}
					resultSizeEl.textContent = formatBytes(blob.size);
				} finally {
					applyBtn.disabled = false; applyBtn.textContent = 'Apply';
				}
			}

			applyBtn.addEventListener('click', applyOp);

			// Handle Download button: if preview and download formats differ (e.g., preview png, download tiff),
			// fetch the desired format and trigger download. If the preview href already points to the
			// desired (non-TIFF) format, allow the browser to perform the native download instead of
			// preventing the default action.
			downloadBtn.addEventListener('click', async (e) => {
				// If we already have a desired download format and it matches the current fmt selection
				// (and it's not TIFF which needs server-side rendering), simply let the browser handle
				// the link click by NOT calling preventDefault().
				if (lastDownloadFormat && lastDownloadFormat === fmt.value && lastDownloadFormat !== 'tiff' && downloadBtn.href && downloadBtn.href !== '#') {
					// let default anchor behavior run (no preventDefault)
					return;
				}
				// Otherwise we will intercept the click and fetch the requested format from the server.
				e.preventDefault();
				if (!lastDownloadFormat) return;
				// If download format is TIFF (or differs), fetch it from server
				const f = fileInput.files[0];
				if (!f) { alert('Select a file first'); return; }
				const form = new FormData();
				form.append('image', f);
				form.append('op', opSelect.value);
				// collect known params
				['ksize','angle','w','h','x','y','alpha','beta'].forEach(id => {
					const el = document.getElementById(id);
					if (el) form.append(id, el.value);
				});
				if (opSelect.value === 'compress') {
					const t = document.getElementById('target');
					const u = document.getElementById('unit');
					if (t) form.append('target', t.value);
					if (u) form.append('unit', u.value);
				}
				if (opSelect.value === 'illustrate') {
					['downscale','num_bilateral','edge_ksize'].forEach(id => {
						const el = document.getElementById(id);
						if (el) form.append(id, el.value);
					});
				}
				const filterEl = document.getElementById('filterType') || document.getElementById('paramFilterType');
				if (filterEl) form.append('type', filterEl.value);
				// request the true download format
				form.append('fmt', lastDownloadFormat);
				form.append('quality', quality.value);
				applyBtn.disabled = true;
				try {
					const res = await fetch('/api/process', { method:'POST', body: form });
					if (!res.ok) { const err = await res.json(); alert('Error: ' + (err.error||res.statusText)); return; }
					const blob = await res.blob();
					// create blob url for download and also update result preview
					if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
					lastBlobUrl = URL.createObjectURL(blob);
					resultImg.src = lastBlobUrl;
					const url = lastBlobUrl;
					const a = document.createElement('a');
					a.href = url;
					a.download = 'result.' + lastDownloadFormat;
					document.body.appendChild(a);
					a.click();
					setTimeout(() => { /* keep preview; do not immediately revoke so user can see it */ a.remove(); }, 1500);
				} finally { applyBtn.disabled = false; }
			});
		</script>
	</body>
</html>
